# Start this with: docker compose -f docker-compose.dev.yml up -d

services:
  uwithme-postgres:
    image: postgres:15.2
    container_name: uwithme-postgres
    restart: always
    volumes:
      - ./postgres-config:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_DB_USER: ${KEYCLOAK_DB_USER}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      U_WITH_ME_DB_USER: ${U_WITH_ME_DB_USER}
      U_WITH_ME_DB_PASSWORD: ${U_WITH_ME_DB_PASSWORD}
      TEST_SYSTEM_DB_USER: ${TEST_SYSTEM_DB_USER}
      TEST_SYSTEM_DB_PASSWORD: ${TEST_SYSTEM_DB_PASSWORD}
      BOT_DB_USER: ${BOT_DB_USER}
      BOT_DB_PASSWORD: ${BOT_DB_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 5s
      retries: 10

  uwithme-keycloak:
    image: quay.io/keycloak/keycloak:20.0.5
    container_name: uwithme-keycloak
    restart: always
    volumes:
      - ./keycloak-config:/opt/keycloak/data/import
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://uwithme-postgres/keycloak
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_PASSWORD}
    command:
      - start-dev --import-realm
    ports:
      - "8080:8080"
    depends_on:
      uwithme-postgres:
        condition: service_healthy
